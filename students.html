<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

<h2>Students Database</h2>

<table border="1">

<tr>
    <th>Reg No</th>
    <th>Name</th>
    <th>Father</th>
    <th>Mother</th>
    <th>Blood Group</th>
    <th>Address</th>
    <th>Phone</th>
    <th>Email</th>
    <th>Department</th>
    <th>Year</th>
</tr>

{% for s in students %}
<tr>
    <td>{{ s[0] }}</td>
    <td>{{ s[1] }}</td>
    <td>{{ s[2] }}</td>
    <td>{{ s[3] }}</td>
    <td>{{ s[4] }}</td>
    <td>{{ s[5] }}</td>
    <td>{{ s[6] }}</td>
    <td>{{ s[7] }}</td>
    <td>{{ s[8] }}</td>
    <td>{{ s[9] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html
