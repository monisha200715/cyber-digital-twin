<!DOCTYPE html>
<html>
<head>
    <title>Cloud Cyber Security Digital Twin</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:400px;
            background:#fff;
            padding:35px;
            border-radius:12px;
            box-shadow:0 0 25px rgba(0,0,0,.3);
        }

        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }

        label{
            font-weight:bold;
            color:#333;
        }

        input[type=text],
        input[type=password]{
            width:100%;
            padding:12px;
            margin-top:6px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        input[type=submit]{
            width:100%;
            padding:12px;
            background:#27ae60;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        input[type=submit]:hover{
            background:#219150;
        }

        .error{
            margin-top:15px;
            text-align:center;
            color:red;
            font-weight:bold;
        }

        .footer{
            margin-top:20px;
            text-align:center;
            color:#888;
            font-size:13px;
        }
    </style>

</head>

<body>

<div class="box">

<h2>🔐 Cloud Cyber Security Digital Twin</h2>

<p>Secure Login Portal</p>

<form method="POST">

<label>Username</label>
<input type="text" name="username" required>

<label>Password</label>
<input type="password" name="password" required>

<input type="submit" value="Login">

</form>

{% if error %}
<div class="error">
🚫 {{ error }}
</div>
{% endif %}

<div class="footer">
Powered by Flask + PostgreSQL
</div>

</div>

</body>
</html>
